<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#DA8A17"/>
      <stop offset="100%" stop-color="#A65E0A"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#FFF2B0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#DA8A17" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hanging cord -->
  <line x1="60" y1="0" x2="60" y2="18" stroke="#A65E0A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hanging loop -->
  <circle cx="60" cy="22" r="5" stroke="#DA8A17" stroke-width="2.5" fill="none"/>

  <!-- Teardrop body -->
  <path d="M60 30 C30 55 18 80 18 100 C18 126 37 145 60 145 C83 145 102 126 102 100 C102 80 90 55 60 30Z"
        fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- Inner shimmer highlight -->
  <path d="M60 38 C38 60 28 82 28 100 C28 120 42 138 60 141"
        stroke="url(#shimmer)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Thin border ring -->
  <path d="M60 30 C30 55 18 80 18 100 C18 126 37 145 60 145 C83 145 102 126 102 100 C102 80 90 55 60 30Z"
        stroke="#A65E0A" stroke-width="1.5" fill="none"/>

  <!-- SS monogram -->
  <text x="60" y="110"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38"
        font-weight="bold"
        text-anchor="middle"
        fill="#1a0a00"
        opacity="0.85"
        letter-spacing="1">SS</text>

  <!-- Fragrance swirl lines -->
  <path d="M108 88 Q118 80 112 70 Q106 60 116 54" stroke="#DA8A17" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M112 100 Q124 90 116 78 Q108 66 120 58" stroke="#F5C842" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
